<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duty Board</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:white;
}

.dashboard{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    height:100vh;
    gap:10px;
    padding:10px;
}

.header{
    grid-column:1/4;
    background:#003366;
    padding:15px;
    display:flex;
    justify-content:space-between;
    font-size:28px;
    font-weight:bold;
}

.box{
    background:#111;
    padding:15px;
    border-radius:10px;
}

h2{
    text-align:center;
    color:#00bfff;
    margin-bottom:15px;
}

/* FIXED LABEL ROW */
.row{
    display:flex;
    align-items:center;
    margin-bottom:10px;
    gap:10px;
}

.label{
    width:60px;
    font-weight:bold;
    color:#fff;
    font-size:18px;
}

/* dropdown */
select{
    flex:1;
    padding:8px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="dashboard">

    <div class="header">
        <div>DGHM MANNAR</div>
        <div id="date"></div>
    </div>

    <!-- CONSULTANT -->
    <div class="box">
        <h2>CONSULTANT</h2>

        <div class="row">
            <div class="label">VP</div>
            <select>
                <option>Select</option>
                <option>Dr.Hansini</option>
                <option>Dr.Wishwara</option>
            </select>
        </div>

        <div class="row">
            <div class="label">VS</div>
            <select>
                <option>Select</option>
                <option>Dr.Tharshan</option>
                <option>Dr.Deniraj</option>
            </select>
        </div>


        <div class="row">
            <div class="label">VOS</div>
            <select>
                <option>Select</option>
                <option>Dr.Chamara</option>
                <option>Dr.2</option>
            </select>
        </div>

        <div class="row">
            <div class="label">VOG</div>
            <select>
                <option>Select</option>
                <option>Dr.Supun</option>
                <option>Dr.Madhanki</option>
            </select>
        </div>

        <div class="row">
            <div class="label">VPa</div>
            <select>
                <option>Select</option>
                <option>Dr.Geethanjali</option>
                <option>Dr.Nishadhi</option>
            </select>
        </div>

        <div class="row">
            <div class="label">Ane</div>
            <select>
                <option>Select</option>
                <option>Dr.Thamosha</option>
                <option>Dr.Kalpani</option>
            </select>
        </div>

    </div>

    <!-- ONCALL -->
    <div class="box">
        <h2>ONCALL</h2>

        <div class="row">
            <div class="label">8-2</div>
            <select><option>Dr.Anupa</option></select>
            <select><option>Dr.Madushi</option></select>
            <select><option>Dr.Heshani</option></select>
            <select><option>Dr.Janith</option></select>

        </div>

        <div class="row">
            <div class="label">2-8</div>
            <select><option>Dr.B</option></select>
        </div>

        <div class="row">
            <div class="label">8-8</div>
            <select><option>Dr.C</option></select>
        </div>

    </div>

    <!-- SPECIAL -->
    <div class="box">
        <h2>SPECIAL</h2>

        <div class="row">
            <div class="label">Medical</div>
            <select><option>Dr.1</option></select>
        </div>

        <div class="row">
            <div class="label">Surgical</div>
            <select><option>Dr.2</option></select>
        </div>

        <div class="row">
            <div class="label">Paediatric</div>
            <select><option>Dr.3</option></select>
        </div>
        <div class="row">
            <div class="label">Gyn&Obs</div>
            <select><option>Dr.3</option></select>
        </div>
        <div class="row">
            <div class="label">Orthopaedic</div>
            <select><option>Dr.3</option></select>
        </div>
        <div class="row">
            <div class="label">Anaesthesia</div>
            <select><option>Dr.3</option></select>
        </div>

    </div>

</div>

<script>
document.getElementById("date").innerHTML =
new Date().toLocaleDateString('en-GB');
</script>

</body>
</html>
